<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCCT 基金排行榜 TOP 10</title>
<style>
  :root {
    --bg: #f8fafc;
    --surface: #ffffff;
    --surface2: #f1f5f9;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-dim: #475569;
    --text-muted: #94a3b8;
    --accent: #2563eb;
    --gold: #d97706;
    --silver: #64748b;
    --bronze: #92400e;
    --green: #16a34a;
    --red: #dc2626;
    --rr1: #059669; --rr1-bg: #05966910;
    --rr2: #0891b2; --rr2-bg: #0891b210;
    --rr3: #2563eb; --rr3-bg: #2563eb10;
    --rr4: #d97706; --rr4-bg: #d9770610;
    --rr5: #dc2626; --rr5-bg: #dc262610;
    --header-h: 64px;
    --tab-h: 50px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100dvh;
    padding-bottom: max(env(safe-area-inset-bottom), 20px);
  }

  /* ─────────────────── Header ─────────────────── */
  .header {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 200;
    box-shadow: 0 1px 6px rgba(37,99,235,0.07);
  }
  .header-brand { display: flex; align-items: center; gap: 10px; }
  .header-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .header-icon svg { width: 21px; height: 21px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .header-title { font-size: 16px; font-weight: 800; color: var(--text); letter-spacing: -0.3px; }
  .header-title span { color: var(--accent); }
  .header-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .header-updated { font-size: 11px; color: var(--text-muted); text-align: right; }

  /* ─────────────────── Tab Nav ─────────────────── */
  .tab-nav {
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: stretch;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    position: sticky;
    top: var(--header-h);
    z-index: 100;
  }
  .tab-nav::-webkit-scrollbar { display: none; }
  .tab-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 0 16px;
    height: var(--tab-h);
    min-width: 44px;
    font-size: 13px; font-weight: 600;
    color: var(--text-muted);
    border: none; background: none; cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: color 0.15s, border-color 0.15s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:not(.active):hover { color: var(--text-dim); }
  .tab-back {
    margin-left: auto; padding: 0 16px;
    height: var(--tab-h);
    display: flex; align-items: center; gap: 5px;
    font-size: 13px; font-weight: 500;
    color: var(--text-muted);
    text-decoration: none; white-space: nowrap;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    transition: color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-back svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .tab-back:hover { color: var(--accent); }

  /* ─────────────────── Content ─────────────────── */
  .content { max-width: 960px; margin: 0 auto; padding: 20px 14px 40px; }

  /* Info bar */
  .info-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 14px;
    margin-bottom: 18px; font-size: 12px; color: var(--text-muted);
    display: flex; flex-wrap: wrap; gap: 4px 18px; align-items: center;
  }
  .info-bar strong { color: var(--text-dim); }
  .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green); margin-right: 5px; vertical-align: middle; }

  /* Tab panels */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Section header */
  .section-head {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px; padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .section-icon-wrap {
    width: 42px; height: 42px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .icon-gold   { background: rgba(217,119,6,0.1); }
  .icon-blue   { background: rgba(37,99,235,0.1); }
  .icon-purple { background: rgba(124,58,237,0.1); }
  .section-icon-wrap svg { width: 22px; height: 22px; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .section-title { font-size: 17px; font-weight: 800; color: var(--text); }
  .section-sub { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  /* ─────────────────── Card Grid ─────────────────── */
  .card-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  @media (min-width: 560px) { .card-grid { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 768px) { .card-grid { display: none; } }

  /* ─────────────────── Fund Card ─────────────────── */
  .fund-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    transition: box-shadow 0.15s;
  }
  .fund-card:active { opacity: 0.92; }
  /* Top accent stripe */
  .fund-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--border);
  }
  .fund-card[data-rank="1"]::before { background: var(--gold); }
  .fund-card[data-rank="2"]::before { background: var(--silver); }
  .fund-card[data-rank="3"]::before { background: var(--bronze); }
  /* Top-3 subtle tint */
  .fund-card[data-rank="1"] { background: linear-gradient(160deg, rgba(217,119,6,0.03) 0%, #fff 70%); }
  .fund-card[data-rank="2"] { background: linear-gradient(160deg, rgba(100,116,139,0.03) 0%, #fff 70%); }
  .fund-card[data-rank="3"] { background: linear-gradient(160deg, rgba(146,64,14,0.03) 0%, #fff 70%); }

  .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }

  /* Rank badge */
  .rank-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 34px; height: 34px; border-radius: 50%;
    font-size: 15px; font-weight: 800; flex-shrink: 0;
  }
  .r-gold   { background: rgba(217,119,6,0.12); color: var(--gold); }
  .r-silver { background: rgba(100,116,139,0.12); color: var(--silver); }
  .r-bronze { background: rgba(146,64,14,0.12); color: var(--bronze); }
  .r-normal { background: var(--surface2); color: var(--text-dim); font-size: 13px; }

  .card-badges { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }

  /* Badges */
  .rr-badge {
    display: inline-block; padding: 3px 8px;
    border-radius: 20px; font-size: 11px; font-weight: 700;
  }
  .rr-RR1 { background: var(--rr1-bg); color: var(--rr1); border: 1px solid var(--rr1); }
  .rr-RR2 { background: var(--rr2-bg); color: var(--rr2); border: 1px solid var(--rr2); }
  .rr-RR3 { background: var(--rr3-bg); color: var(--rr3); border: 1px solid var(--rr3); }
  .rr-RR4 { background: var(--rr4-bg); color: var(--rr4); border: 1px solid var(--rr4); }
  .rr-RR5 { background: var(--rr5-bg); color: var(--rr5); border: 1px solid var(--rr5); }
  .rr-unknown { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .freq-badge {
    display: inline-block; padding: 3px 7px;
    border-radius: 6px; font-size: 11px;
    background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border);
  }
  .cur-badge {
    display: inline-block; padding: 3px 7px;
    border-radius: 6px; font-size: 11px; font-weight: 600;
    background: rgba(37,99,235,0.07); color: var(--accent); border: 1px solid rgba(37,99,235,0.18);
  }

  /* Fund name */
  .card-name {
    font-size: 14.5px; font-weight: 700; color: var(--text);
    line-height: 1.4; margin-bottom: 4px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-code { font-size: 11px; color: var(--text-muted); }

  /* Primary metric */
  .card-divider { height: 1px; background: var(--border); margin: 12px 0; }
  .card-primary-label {
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px;
  }
  .card-primary-value {
    font-size: 28px; font-weight: 800; line-height: 1.1;
    color: var(--gold);
  }
  .rate-bar {
    height: 5px; background: var(--border);
    border-radius: 3px; overflow: hidden; margin-top: 8px;
  }
  .rate-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent) 0%, #60a5fa 100%);
    border-radius: 3px; transition: width 0.5s ease;
  }

  /* Stats row */
  .card-stats {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 10px; margin-top: 12px;
  }
  .stat-label {
    font-size: 10px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px;
  }
  .stat-value { font-size: 14px; font-weight: 700; }

  /* Value colors */
  .v-pos { color: var(--green); }
  .v-neg { color: var(--red); }
  .v-hi  { color: var(--gold); }
  .v-dim { color: var(--text-muted); font-weight: 400; }

  /* ──────────────── Skeleton ─────────────────── */
  .skel-grid {
    display: grid; grid-template-columns: 1fr; gap: 12px;
  }
  @media (min-width: 560px) { .skel-grid { grid-template-columns: 1fr 1fr; } }
  .skel-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px;
  }
  .skel {
    background: linear-gradient(90deg, #f0f4f8 25%, #e6ebf0 50%, #f0f4f8 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s ease infinite;
    border-radius: 6px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .skel-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
  .skel-circle { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; }
  .skel-pill { height: 24px; border-radius: 20px; }
  .skel-line { height: 14px; margin-bottom: 6px; }
  .skel-line-sm { height: 11px; }
  .skel-big { height: 32px; border-radius: 6px; }
  .skel-bar { height: 5px; border-radius: 3px; margin-top: 8px; }
  .skel-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 12px; }

  /* ─────────────────── Error ─────────────────── */
  .error-state { text-align: center; padding: 60px 24px; }
  .error-icon-wrap {
    width: 56px; height: 56px;
    background: rgba(220,38,38,0.08); border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
  }
  .error-icon-wrap svg { width: 28px; height: 28px; stroke: var(--red); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .error-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .error-msg { color: var(--red); font-size: 13px; }
  .retry-btn {
    margin-top: 18px;
    background: var(--accent); color: #fff;
    border: none; padding: 12px 28px;
    border-radius: 10px; cursor: pointer;
    font-size: 14px; font-weight: 700;
    min-height: 48px; min-width: 120px;
    transition: background 0.15s;
  }
  .retry-btn:hover { background: #1d4ed8; }

  /* ─────────────────── Desktop Table ─────────────────── */
  .table-wrap {
    overflow-x: auto; border-radius: 12px;
    border: 1px solid var(--border);
    display: none;
  }
  @media (min-width: 768px) { .table-wrap { display: block; } }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    position: sticky; top: calc(var(--header-h) + var(--tab-h)); z-index: 10;
    background: var(--surface2); color: var(--text-dim);
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.6px;
    padding: 10px 14px; text-align: left; white-space: nowrap;
    border-bottom: 1px solid var(--border);
  }
  thead th.r { text-align: right; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #eef3ff; }
  tbody td { padding: 11px 14px; vertical-align: middle; }
  tbody td.r { text-align: right; font-variant-numeric: tabular-nums; }
  tbody tr[data-rank="1"] { background: rgba(217,119,6,0.04); }
  tbody tr[data-rank="2"] { background: rgba(100,116,139,0.05); }
  tbody tr[data-rank="3"] { background: rgba(146,64,14,0.04); }
  tbody tr[data-rank="1"]:hover, tbody tr[data-rank="2"]:hover, tbody tr[data-rank="3"]:hover { background: #eef3ff; }
  tbody tr[data-rank="1"] td:first-child { box-shadow: inset 3px 0 0 var(--gold); }
  tbody tr[data-rank="2"] td:first-child { box-shadow: inset 3px 0 0 var(--silver); }
  tbody tr[data-rank="3"] td:first-child { box-shadow: inset 3px 0 0 var(--bronze); }
  .rank { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; font-size: 13px; font-weight: 700; }
  .rank.gold   { background: rgba(217,119,6,0.12); color: var(--gold); }
  .rank.silver { background: rgba(100,116,139,0.12); color: var(--silver); }
  .rank.bronze { background: rgba(146,64,14,0.12); color: var(--bronze); }
  .rank.normal { background: var(--surface2); color: var(--text-dim); font-size: 12px; }
  .name-cell { max-width: 260px; min-width: 160px; }
  .fund-name-td { font-weight: 600; font-size: 13.5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
  .fund-code-td { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .fundname-warning { font-size: 11px; color: var(--text-muted); font-weight: 400; display: block; }
  .rate-cell-inner { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
  .rate-mini-bar { width: 72px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .rate-mini-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent) 0%, #60a5fa 100%); border-radius: 2px; }
</style>
</head>
<body>

<!-- ─── Header ─── -->
<header class="header">
  <div class="header-brand">
    <div class="header-icon">
      <svg viewBox="0 0 24 24">
        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
        <path d="M4 22h16"/>
        <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
        <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
        <path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>
      </svg>
    </div>
    <div>
      <div class="header-title">VCCT <span>TOP 10</span></div>
      <div class="header-sub">基金排行榜・每日自動更新</div>
    </div>
  </div>
  <div class="header-updated" id="hdr-updated">載入中…</div>
</header>

<!-- ─── Tab Nav ─── -->
<nav class="tab-nav">
  <button class="tab-btn active" data-tab="rate" onclick="switchTab('rate')">
    <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    年化配息率
  </button>
  <button class="tab-btn" data-tab="ret3y" onclick="switchTab('ret3y')">
    <svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
    三年報酬
  </button>
  <button class="tab-btn" data-tab="rr3" onclick="switchTab('rr3')">
    <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    RR3 精選
  </button>
  <a class="tab-back" href="/">
    <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
    主頁
  </a>
</nav>

<main class="content">

  <!-- Info bar -->
  <div id="info-bar" class="info-bar" style="display:none">
    <span><span class="status-dot"></span><strong>資料狀態：</strong>正常</span>
    <span id="info-fetched"></span>
    <span id="info-generated"></span>
  </div>

  <!-- Skeleton loading -->
  <div id="loading">
    <div class="skel-grid" id="skel-grid"></div>
  </div>

  <!-- Error -->
  <div id="error" class="error-state" style="display:none">
    <div class="error-icon-wrap">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>
    <div class="error-title">無法載入排行榜</div>
    <div class="error-msg" id="error-msg"></div>
    <button class="retry-btn" onclick="loadData()">重新載入</button>
  </div>

  <!-- Sections -->
  <div id="sections" style="display:none">

    <!-- ── 年化配息率 ── -->
    <div class="tab-panel active" id="panel-rate">
      <div class="section-head">
        <div class="section-icon-wrap icon-gold">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
        </div>
        <div>
          <div class="section-title">年化配息率 TOP 10</div>
          <div class="section-sub">月配息基金 × 近 6 個月平均配息 × 12 ÷ 淨值</div>
        </div>
      </div>
      <div class="card-grid" id="cards-rate"></div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th style="width:42px">#</th><th>基金名稱</th><th>幣別</th><th>風險</th>
            <th class="r">年化配息率</th><th class="r">六月報酬</th><th class="r">一年報酬</th><th class="r">三年報酬</th>
          </tr></thead>
          <tbody id="tbody-rate"></tbody>
        </table>
      </div>
    </div>

    <!-- ── 三年報酬 ── -->
    <div class="tab-panel" id="panel-ret3y">
      <div class="section-head">
        <div class="section-icon-wrap icon-blue">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
          </svg>
        </div>
        <div>
          <div class="section-title">三年總報酬率 TOP 10</div>
          <div class="section-sub">全部 VCCT 基金 · 三年累積報酬率排名</div>
        </div>
      </div>
      <div class="card-grid" id="cards-ret3y"></div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th style="width:42px">#</th><th>基金名稱</th><th>幣別</th><th>風險</th><th>配息</th>
            <th class="r">三年報酬</th><th class="r">一年報酬</th><th class="r">年化配息率</th>
          </tr></thead>
          <tbody id="tbody-ret3y"></tbody>
        </table>
      </div>
    </div>

    <!-- ── RR3 精選 ── -->
    <div class="tab-panel" id="panel-rr3">
      <div class="section-head">
        <div class="section-icon-wrap icon-purple">
          <svg viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </div>
        <div>
          <div class="section-title">RR3 三年總報酬 TOP 10</div>
          <div class="section-sub">僅限風險等級 RR3 · 三年累積報酬率排名</div>
        </div>
      v>
      </div>
      <div class="card-grid" id="cards-rr3"></div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th style="width:42px">#</th><th>基金名稱</th><th>幣別</th><th>風險</th><th>配息</th>
            <th class="r">三年報酬</th><th class="r">一年報酬</th><th class="r">年化配息率</th>
          </tr></thead>
          <tbody id="tbody-rr3"></tbody>
        </table>
      </div>
    </div>

  </div><!-- /sections -->
</main>

<script>
const API_URL = '/api/vcct-top10';

/* ── Skeleton ── */
(function buildSkeleton() {
  var g = document.getElementById('skel-grid');
  var h = '';
  for (var i = 0; i < 6; i++) {
    h += '<div class="skel-card">' +
      '<div class="skel-row"><div class="skel skel-circle"></div><div class="skel skel-pill" style="width:54px"></div><div class="skel skel-pill" style="width:42px"></div></div>' +
      '<div class="skel skel-line" style="width:88%"></div>' +
      '<div class="skel skel-line-sm" style="width:55%;margin-bottom:14px"></div>' +
      '<div class="skel skel-line-sm" style="width:110px;margin-bottom:6px"></div>' +
      '<div class="skel skel-big" style="width:140px"></div>' +
      '<div class="skel skel-bar" style="width:100%"></div>' +
      '<div class="skel-stats">' +
        '<div><div class="skel skel-line-sm" style="width:100%;margin-bottom:5px"></div><div class="skel skel-line" style="width:75%"></div></div>' +
        '<div><div class="skel skel-line-sm" style="width:100%;margin-bottom:5px"></div><div class="skel skel-line" style="width:75%"></div></div>' +
        '<div><div class="skel skel-line-sm" style="width:100%;margin-bottom:5px"></div><div class="skel skel-line" style="width:75%"></div></div>' +
      '</div>' +
    '</div>';
  }
  g.innerHTML = h;
})();

/* ── Tab switching ── */
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  document.querySelectorAll('.tab-panel').forEach(function(p) {
    p.classList.toggle('active', p.id === 'panel-' + tab);
  });
}

/* ── Helpers ── */
function strip(s) { return s ? String(s).replace(/<[^>]*>/g, '') : ''; }
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function pct(v) {
  if (v == null) return '<span class="v-dim">—</span>';
  var s = (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
  return '<span class="' + (v >= 0 ? 'v-pos' : 'v-neg') + '">' + s + '</span>';
}

function pctHi(v) {
  if (v == null) return '<span class="v-dim">—</span>';
  var s = (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
  if (v > 15) return '<span class="v-hi">' + s + '</span>';
  return '<span class="' + (v >= 0 ? 'v-pos' : 'v-neg') + '">' + s + '</span>';
}

function rrBadge(rr) {
  var cls = (rr && /^RR[1-5]$/.test(rr)) ? 'rr-' + rr : 'rr-unknown';
  return '<span class="rr-badge ' + cls + '">' + esc(rr || '?') + '</span>';
}

function freqBadge(freq) {
  if (!freq || freq === '無') return '';
  return '<span class="freq-badge">' + esc(freq) + '</span>';
}

function curBadge(cur) {
  if (!cur || cur === '—') return '';
  return '<span class="cur-badge">' + esc(cur) + '</span>';
}

var RANK_SVG = {
  1: '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 2h10v9a5 5 0 01-10 0V2z"/><path d="M7 6H4a2 2 0 000 4h3"/><path d="M17 6h3a2 2 0 010 4h-3"/><rect x="9" y="16" width="6" height="2" rx="1"/><rect x="7" y="18" width="10" height="2" rx="1"/></svg>',
  2: '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>',
  3: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="6"/><path d="M8.56 13.67L7 22l5-3 5 3-1.56-8.34"/></svg>'
};

function rankBadgeCard(n) {
  var cls = n === 1 ? 'r-gold' : n === 2 ? 'r-silver' : n === 3 ? 'r-bronze' : 'r-normal';
  var content = n <= 3 ? RANK_SVG[n] : n;
  return '<span class="rank-badge ' + cls + '">' + content + '</span>';
}

function rankBadgeTbl(n) {
  var cls = n === 1 ? 'gold' : n === 2 ? 'silver' : n === 3 ? 'bronze' : 'normal';
  var content = n <= 3 ? RANK_SVG[n] : n;
  return '<span class="rank ' + cls + '">' + content + '</span>';
}

/* ── Card renderers ── */
function renderRateCards(data) {
  var maxRate = Math.max.apply(null, data.map(function(f){ return f.rate || 0; }).concat([0.01]));
  return data.map(function(f) {
    var barW = maxRate > 0 ? Math.round((f.rate || 0) / maxRate * 100) : 0;
    return '<div class="fund-card" data-rank="' + f.rank + '">' +
      '<div class="card-top">' + rankBadgeCard(f.rank) +
        '<div class="card-badges">' + rrBadge(f.rr) + curBadge(f.cur) + '</div>' +
      '</div>' +
      '<div class="card-name">' + f.name + '</div>' +
      '<div class="card-code">' + esc(f.code) + '</div>' +
      '<div class="card-divider"></div>' +
      '<div class="card-primary-label">年化配息率</div>' +
      '<div class="card-primary-value">' + (f.rate != null ? f.rate.toFixed(2) + '%' : '—') + '</div>' +
      '<div class="rate-bar"><div class="rate-bar-fill" style="width:' + barW + '%"></div></div>' +
      '<div class="card-stats">' +
        '<div><div class="stat-label">六月報酬</div><div class="stat-value">' + pct(f.ret6m) + '</div></div>' +
        '<div><div class="stat-label">一年報酬</div><div class="stat-value">' + pct(f.ret1y) + '</div></div>' +
        '<div><div class="stat-label">三年報酬</div><div class="stat-value">' + pctHi(f.ret3y) + '</div></div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function renderRetCards(data) {
  return data.map(function(f) {
    var v = f.ret3y;
    var primColor = v > 15 ? 'var(--gold)' : v >= 0 ? 'var(--green)' : 'var(--red)';
    var primStr = v != null ? (v >= 0 ? '+' : '') + v.toFixed(2) + '%' : '—';
    return '<div class="fund-card" data-rank="' + f.rank + '">' +
      '<div class="card-top">' + rankBadgeCard(f.rank) +
        '<div class="card-badges">' + rrBadge(f.rr) + freqBadge(f.freq) + curBadge(f.cur) + '</div>' +
      '</div>' +
      '<div class="card-name">' + f.name + '</div>' +
      '<div class="card-code">' + esc(f.code) + '</div>' +
      '<div class="card-divider"></div>' +
      '<div class="card-primary-label">三年累積報酬</div>' +
      '<div class="card-primary-value" style="color:' + primColor + '">' + primStr + '</div>' +
      '<div class="card-stats">' +
        '<div><div class="stat-label">一年報酬</div><div class="stat-value">' + pct(f.ret1y) + '</div></div>' +
        '<div><div class="stat-label">六月報酬</div><div class="stat-value">' + pct(f.ret6m) + '</div></div>' +
        '<div><div class="stat-label">年化配息</div><div class="stat-value">' + (f.rate != null ? '<span class="v-hi">' + f.rate.toFixed(2) + '%</span>' : '<span class="v-dim">—</span>') + '</div></div>' +
      '</div>' +
    '</div>';
  }).join('');
}

/* ── Table renderers (desktop) ── */
function renderRateTable(data) {
  var maxRate = Math.max.apply(null, data.map(function(f){ return f.rate || 0; }).concat([0.01]));
  return data.map(function(f) {
    var barW = maxRate > 0 ? Math.round((f.rate || 0) / maxRate * 100) : 0;
    return '<tr data-rank="' + f.rank + '">' +
      '<td>' + rankBadgeTbl(f.rank) + '</td>' +
      '<td class="name-cell"><div class="fund-name-td" title="' + esc(strip(f.name)) + '">' + f.name + '</div><div class="fund-code-td">' + esc(f.code) + '</div></td>' +
      '<td>' + esc(f.cur || '—') + '</td>' +
      '<td>' + rrBadge(f.rr) + '</td>' +
      '<td class="r"><div class="rate-cell-inner"><span class="v-hi">' + (f.rate != null ? f.rate.toFixed(2) + '%' : '—') + '</span><div class="rate-mini-bar"><div class="rate-mini-bar-fill" style="width:' + barW + '%"></div></div></div></td>' +
      '<td class="r">' + pct(f.ret6m) + '</td>' +
      '<td class="r">' + pct(f.ret1y) + '</td>' +
      '<td class="r">' + pctHi(f.ret3y) + '</td>' +
    '</tr>';
  }).join('');
}

function renderRetTable(data) {
  return data.map(function(f) {
    return '<tr data-rank="' + f.rank + '">' +
      '<td>' + rankBadgeTbl(f.rank) + '</td>' +
      '<td class="name-cell"><div class="fund-name-td" title="' + esc(strip(f.name)) + '">' + f.name + '</div><div class="fund-code-td">' + esc(f.code) + '</div></td>' +
      '<td>' + esc(f.cur || '—') + '</td>' +
      '<td>' + rrBadge(f.rr) + '</td>' +
      '<td>' + (freqBadge(f.freq) || '<span class="v-dim">—</span>') + '</td>' +
      '<td class="r">' + pctHi(f.ret3y) + '</td>' +
      '<td class="r">' + pct(f.ret1y) + '</td>' +
      '<td class="r">' + (f.rate != null ? f.rate.toFixed(2) + '%' : '<span class="v-dim">—</span>') + '</td>' +
    '</tr>';
  }).join('');
}

/* ── Load data ── */
async function loadData() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('error').style.display = 'none';
  document.getElementById('sections').style.display = 'none';
  document.getElementById('info-bar').style.display = 'none';

  try {
    var resp = await fetch(API_URL);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var data = await resp.json();
    if (data.error) throw new Error(data.error);

    var rateData  = data.top10Rate || [];
    var ret3yData = data.top10Ret3y || [];
    var rr3Data   = data.top10Ret3yRR3 || [];

    /* Cards */
    document.getElementById('cards-rate').innerHTML  = renderRateCards(rateData);
    document.getElementById('cards-ret3y').innerHTML = renderRetCards(ret3yData);
    document.getElementById('cards-rr3').innerHTML   = renderRetCards(rr3Data);

    /* Tables */
    document.getElementById('tbody-rate').innerHTML  = renderRateTable(rateData);
    document.getElementById('tbody-ret3y').innerHTML = renderRetTable(ret3yData);
    document.getElementById('tbody-rr3').innerHTML   = renderRetTable(rr3Data);

    var fetched   = data.fetchedAt   ? '資料抓取：' + data.fetchedAt   : '';
    var generated = data.generatedAt ? '計算時間：' + data.generatedAt : '';
    document.getElementById('info-fetched').textContent   = fetched;
    document.getElementById('info-generated').textContent = generated;
    document.getElementById('info-bar').style.display = 'flex';
    document.getElementById('hdr-updated').textContent =
      data.generatedAt ? '更新 ' + data.generatedAt : '已更新';

    document.getElementById('loading').style.display  = 'none';
    document.getElementById('sections').style.display = 'block';
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').textContent = e.message;
    document.getElementById('error').style.display   = 'block';
  }
}

loadData();
</script>
</body>
</html>
